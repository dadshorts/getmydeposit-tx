<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — GetMyDeposit</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
:root{--page:#f6f6f4;--surface:#fff;--text:#1d1d1b;--muted:#6b6b66;--border:#e6e6e1;--accent:#2563eb;--radius:8px}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px 28px;max-width:440px;text-align:center}
.ic{font-size:42px;color:var(--muted)}
h1{font-size:22px;font-weight:700;margin:12px 0 8px}
p{font-size:15px;color:var(--muted);margin:0 0 22px}
.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:13px 24px;border-radius:var(--radius);font-size:15px;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <i class="ti ti-map-pin-off ic" aria-hidden="true"></i>
    <h1>Page not found</h1>
    <p>That page doesn't exist — but your security deposit might still be waiting. Let's go get it.</p>
    <a class="btn" href="/">Get your deposit back</a>
  </div>
</body>
</html>
